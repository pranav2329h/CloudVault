services:
  mongodb:
    image: mongo:7
    container_name: cloudvault-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - cloudvault-network

  backend:
    image: ${BACKEND_IMAGE:-pranav2329h/cloudvault-backend:latest}
    build: .
    container_name: cloudvault-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      PORT: 5000
      MONGO_URI: ${MONGO_URI:-mongodb://admin:password@mongodb:27017/?authSource=admin}
      DATABASE_NAME: ${DATABASE_NAME:-cloudvault}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://cloudvault-pranav.duckdns.org}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cloudvault-network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: cloudvault-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - tools
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin123}
    networks:
      - cloudvault-network

  frontend:
    image: ${FRONTEND_IMAGE:-cloudvault-frontend:latest}
    build: ../frontend
    container_name: cloudvault-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - cloudvault-network

volumes:
  mongodb_data:

networks:
  cloudvault-network:
    driver: bridge
