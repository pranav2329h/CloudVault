version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: cloudvault-mongodb
    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

    volumes:
      - mongodb_data:/data/db

    networks:
      - cloudvault-network


  backend:
    build: .
    container_name: cloudvault-backend

    restart: always

    depends_on:
      - mongodb

    ports:
      - "5000:5000"

    env_file:
      - .env

    networks:
      - cloudvault-network


  mongo-express:
    image: mongo-express:1.0.2
    container_name: cloudvault-mongo-express

    restart: always

    depends_on:
      - mongodb

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_SERVER: mongodb

      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123

    networks:
      - cloudvault-network


volumes:
  mongodb_data:


networks:
  cloudvault-network: