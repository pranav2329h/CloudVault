services:

  mongodb:
    image: mongo:7
    pull_policy: always
    container_name: cloudvault-mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}

    ports:
      - "${MONGO_PORT:-27017}:27017"

    volumes:
      - mongodb_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

    networks:
      - cloudvault-network

  backend:
    image: pranav2329h/cloudvault-backend:latest
    pull_policy: always
    container_name: cloudvault-backend
    restart: unless-stopped

    depends_on:
      mongodb:
        condition: service_healthy

    env_file:
      - .env

    environment:
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      DATABASE_NAME: ${DATABASE_NAME}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}

      STORAGE_BACKEND: ${STORAGE_BACKEND}
      CORS_ORIGINS: ${CORS_ORIGINS}

    ports:
      - "5000:5000"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

    networks:
      - cloudvault-network

  frontend:
    image: pranav2329h/cloudvault-frontend:latest
    pull_policy: always
    container_name: cloudvault-frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    environment:
      VITE_API_BASE_URL: https://cloudvault-pranav.duckdns.org/api

    ports:
      - "8080:80"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

    networks:
      - cloudvault-network

  mongo-express:
    image: mongo-express:1.0.2
    pull_policy: always
    container_name: cloudvault-mongo-express
    restart: unless-stopped

    depends_on:
      mongodb:
        condition: service_healthy

    profiles:
      - tools

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongodb

      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin123}

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

    networks:
      - cloudvault-network

volumes:
  mongodb_data:

networks:
  cloudvault-network:
    driver: bridge